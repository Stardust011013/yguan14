short_bio: >-
  <p>
    I am a doctoral student at the <a href="https://www.polyu.edu.hk/dsai/" target="_blank" rel="noopener">Department of Data Science and Artificial Intelligence</a> at <a href="https://www.polyu.edu.hk/" target="_blank" rel="noopener">The Hong Kong Polytechnic University</a>. My academic interests include computer graphics, computer vision, and their effective integration with AI.
  </p>
  <p>
    I am fortunate to be advised by <a href="https://www.polyu.edu.hk/dsai/people/academic-staff/yang-xingyi/" target="_blank" rel="noopener">Professor Xingyi Yang</a> and honored to be a recipient of the prestigious <a href="https://cerg1.ugc.edu.hk/hkpfs/index.html" target="_blank" rel="noopener">Hong Kong PhD Fellowship Scheme (HKPFS)</a>. Before joining PolyU, I received my M.Sc. in Computer Science, B.Sc. in Computer Science, and B.A. in Sociology from <a href="https://www.brown.edu/" target="_blank" rel="noopener">Brown University</a>, where I was honored to be advised by <a href="https://dritchie.github.io/" target="_blank" rel="noopener">Professor Daniel Ritchie</a> and become an alumnus of <a href="https://visual.cs.brown.edu/" target="_blank" rel="noopener">Brown Visual Computing</a>.
  </p>

